<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:#2a2a3e;
  --text:#f0f0f8;--muted:#8888aa;--accent:#7c6dfa;--accent2:#4ecdc4;
  --gold:#f4c542;--danger:#ff5c5c;--success:#4ecdc4;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:4px;height:56px;position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-0.5px;cursor:pointer;padding:6px 12px;border-radius:6px}
.logo span{color:var(--accent)}
.nav-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:6px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;transition:all .15s}
.nav-btn:hover,.nav-btn.active{color:var(--text);background:var(--card)}
.nav-r{margin-left:auto;display:flex;gap:8px;align-items:center}
.user-pill{font-size:12px;color:var(--muted);padding:4px 10px;background:var(--card);border-radius:20px;border:1px solid var(--border)}
.page{flex:1;padding:24px;max-width:1100px;margin:0 auto;width:100%}
h1{font-family:'Syne',sans-serif;font-weight:700;font-size:26px;margin-bottom:6px}
.sub{color:var(--muted);font-size:14px;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g4p{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.ba{background:rgba(78,205,196,.15);color:#4ecdc4;border:1px solid rgba(78,205,196,.3)}
.bi{background:rgba(255,92,92,.12);color:#ff5c5c;border:1px solid rgba(255,92,92,.3)}
.bp{background:rgba(124,109,250,.15);color:#a89cf7;border:1px solid rgba(124,109,250,.3)}
.bg2{background:rgba(244,197,66,.12);color:#f4c542;border:1px solid rgba(244,197,66,.3)}
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover:not(:disabled){background:#6a5ce8}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-g:hover:not(:disabled){background:var(--card)}
.btn-d{background:rgba(255,92,92,.12);color:#ff5c5c;border:1px solid rgba(255,92,92,.3)}
.btn-s{padding:5px 12px;font-size:12px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.sl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.sv{font-family:'Syne',sans-serif;font-weight:700;font-size:26px}
.ss{font-size:12px;color:var(--muted);margin-top:3px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.6px}
td{padding:10px 12px;border-bottom:1px solid rgba(42,42,62,.5)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
input,select,textarea{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
.lbl{font-size:12px;color:var(--muted);margin-bottom:5px}
.fr{margin-bottom:14px}
.row{display:flex;gap:12px;align-items:center}
.f1{flex:1}
.plan-card{border-radius:12px;padding:20px;position:relative;cursor:pointer;transition:transform .2s;border:1px solid var(--border)}
.plan-card:hover{transform:translateY(-2px)}
.pc-free{background:linear-gradient(135deg,#1a1a26,#1e1e2e)}
.pc-standard{background:linear-gradient(135deg,#1a1a2e,#1e1e38);border-color:rgba(124,109,250,.3)}
.pc-pro{background:linear-gradient(135deg,#1a2030,#1e2a40);border-color:rgba(78,205,196,.3)}
.pc-business{background:linear-gradient(135deg,#201a10,#2a2010);border-color:rgba(244,197,66,.4)}
.pn{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px}
.pp{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;margin:10px 0}
.pt{font-size:13px;color:var(--muted)}
.pf{font-size:12px;color:var(--muted);padding:3px 0;display:flex;gap:6px}
.pf::before{content:'✓';color:var(--success);flex-shrink:0;font-size:11px;margin-top:1px}
.pf.lk{color:rgba(136,136,170,.4)}
.pf.lk::before{content:'×';color:rgba(255,92,92,.4)}
.pop{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:10px;font-weight:600;padding:3px 12px;border-radius:20px;white-space:nowrap}
.pb{background:var(--border);border-radius:4px;height:5px;overflow:hidden;margin-top:6px}
.pf2{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s}
.alert{padding:12px 14px;border-radius:8px;font-size:13px;display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.ai{background:rgba(124,109,250,.1);border:1px solid rgba(124,109,250,.3);color:#c4baff}
.aw{background:rgba(244,197,66,.08);border:1px solid rgba(244,197,66,.25);color:#e8c060}
.ao{background:rgba(78,205,196,.08);border:1px solid rgba(78,205,196,.25);color:#4ecdc4}
.ae{background:rgba(255,92,92,.08);border:1px solid rgba(255,92,92,.25);color:#ff5c5c}
.tabs{display:flex;gap:2px;background:var(--surface);border-radius:9px;padding:3px;margin-bottom:20px;border:1px solid var(--border)}
.tab{flex:1;padding:7px;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;border-radius:7px;cursor:pointer;transition:all .15s;font-weight:500}
.tab.active{background:var(--card);color:var(--text)}
.div{height:1px;background:var(--border);margin:16px 0}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.currency-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
.currency-card{border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;text-align:center;background:var(--surface)}
.currency-card:hover,.currency-card.selected{border-color:var(--accent);background:rgba(124,109,250,.08)}
.currency-card.selected{border-width:2px}
.currency-icon{font-size:22px;margin-bottom:6px}
.currency-name{font-size:12px;font-weight:500}
.currency-amount{font-size:13px;color:var(--accent2);font-weight:600;margin-top:3px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;margin-bottom:4px}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;margin-top:-4px}
.sp{background:var(--surface);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.sb{height:90px;display:flex;align-items:center;padding:0 20px;gap:12px;background:linear-gradient(135deg,#2a1a4e,#1a3040)}
.slc{width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:18px;flex-shrink:0}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px}
.pc2{background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.pi2{height:100px;display:flex;align-items:center;justify-content:center;font-size:32px;background:linear-gradient(135deg,#2a2a3e,#1e1e2e);position:relative;overflow:hidden}
.pi2 img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.pci{padding:10px}
.pcn{font-size:12px;font-weight:500;margin-bottom:3px}
.pcp{font-size:13px;color:var(--accent2);font-weight:600}
.pcb{width:100%;margin-top:8px;padding:7px;background:var(--accent);border:none;border-radius:5px;color:#fff;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.st2{font-family:'Syne',sans-serif;font-weight:600;font-size:15px}
.ab{display:flex;flex-direction:column;gap:8px}
.ar{display:flex;align-items:center;gap:10px;font-size:13px}
.al{min-width:70px;color:var(--muted);font-size:12px}
.at{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.af{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.av{min-width:40px;text-align:right;font-size:12px;color:var(--muted)}
.img-upload{border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .15s}
.img-upload:hover{border-color:var(--accent)}
.imgs-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.img-thumb{width:60px;height:60px;border-radius:6px;object-fit:cover;border:1px solid var(--border)}
</style>
</head>

<nav>

<script>
// ── Config ────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://tgslxwhmjbdkgwljhyxp.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnc2x4d2htamJka2d3bGpoeXhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzkyNTYsImV4cCI6MjA5MTQxNTI1Nn0.fLY-7PjMWpEPdZ-xa_UaL_FRINtsNjVOukXgVjzEkBk';
// SUBSTITUI pelo URL do teu backend no Render após publicar:
let API_BASE = localStorage.getItem('api_base') || 'https://digimarket-h0vk.onrender.com';

const ADMINS = ['orlandojaime833@gmail.com','orlandojaime800@gmail.com'];
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const PLANS = [
  {id:'free',name:'Free',price:0,c:'#8888aa',prods:5,imgs:1,
   feat:['5 produtos','1 imagem/produto','Sub-loja básica'],
   lock:['Banner personalizado','Analytics','Redes sociais','Domínio próprio','Sem marca DIGIMarket']},
  {id:'standard',name:'Standard',price:9,c:'#7c6dfa',prods:30,imgs:3,pop:true,
   feat:['30 produtos','3 imagens/produto','Banner personalizado'],
   lock:['Analytics avançado','Redes sociais','Domínio próprio','Sem marca DIGIMarket']},
  {id:'pro',name:'Pro',price:25,c:'#4ecdc4',prods:100,imgs:5,
   feat:['100 produtos','5 imagens/produto','Banner','Analytics','Redes sociais','Domínio personalizado'],
   lock:['Sem marca DIGIMarket']},
  {id:'business',name:'Business',price:60,c:'#f4c542',prods:9999,imgs:10,
   feat:['Ilimitados produtos','10 imgs/produto','Tudo incluído','Sem marca DIGIMarket'],
   lock:[]}
];

// ── Estado global ─────────────────────────────────────────────────────
let page='landing', user=null, lojista=null;
let dtab='overview', atab='users';
let selPlan=null, selCurrency=null, currencies=[], invoiceData=null;
let pollInterval=null;

// ── API helper ────────────────────────────────────────────────────────
async function api(method, path, body) {
  const { data:{ session } } = await sb.auth.getSession();
  const headers = { 'Content-Type': 'application/json' };
  if (session?.access_token) headers['Authorization'] = 'Bearer ' + session.access_token;
  const res = await fetch(API_BASE + path, {
    method, headers, body: body ? JSON.stringify(body) : undefined
  });
  return res.json();
}

// ── Auth ──────────────────────────────────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  user = session?.user || null;
  updateNav();
  if (user && page === 'login') {
    await loadLojista();
    if (ADMINS.includes(user.email)) goTo('admin');
    else goTo('dashboard');
  }
});

async function loadLojista() {
  if (!user) return;
  try {
    const r = await api('GET', '/api/lojista/me');
    if (r.success) lojista = r.lojista;
    else {
      // Criar registo de lojista se não existir
      await api('POST', '/api/lojista/setup', { nome_loja: 'A Minha Loja' });
      const r2 = await api('GET', '/api/lojista/me');
      if (r2.success) lojista = r2.lojista;
    }
  } catch(e) { console.error(e); }
}

function updateNav() {
  const nr = document.getElementById('nav-r');
  if (!nr) return;
  if (user) {
    nr.innerHTML = `
      <span class="user-pill">👤 ${user.email.split('@')[0]}</span>
      <button class="btn btn-g btn-s" onclick="doLogout()">Sair</button>`;
  } else {
    nr.innerHTML = `
      <button class="btn btn-g btn-s" onclick="goTo('login')">Entrar</button>
      <button class="btn btn-p btn-s" onclick="goTo('plans')">Criar Loja</button>`;
  }
}

async function doLogout() {
  await sb.auth.signOut();
  user = null; lojista = null;
  updateNav(); goTo('landing');
}

function requireAuth(p) {
  if (!user) { goTo('login'); return; }
  goTo(p);
}

// ── Navegação ─────────────────────────────────────────────────────────
function goTo(p) {
  page = p;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const m = {plans:'nb-plans',dashboard:'nb-dashboard',admin:'nb-admin'};
  if (m[p]) document.getElementById(m[p])?.classList.add('active');
  render();
}

function render() {
  const c = document.getElementById('ct');
  const fns = {
    landing:rLanding, plans:rPlans, login:rLogin,
    dashboard:rDash, store:rStore, admin:rAdmin, checkout:rCheckout
  };
  c.innerHTML = (fns[page] || rLanding)();
  afterRender();
}

function afterRender() {
  if (page === 'checkout' && !currencies.length) loadCurrencies();
  if (page === 'dashboard' && user && !lojista) loadLojista().then(render);
}

// ── LANDING ───────────────────────────────────────────────────────────
function rLanding() {
  return `<div class="page">
  <div style="text-align:center;padding:48px 0 32px">
    <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:46px;letter-spacing:-1px;line-height:1.1;margin-bottom:14px">
      Cria a tua loja online<br><span style="color:var(--accent)">em minutos</span>
    </div>
    <p style="color:var(--muted);font-size:16px;max-width:460px;margin:0 auto 28px;line-height:1.7">
      Plataforma de e-commerce com pagamentos em <strong style="color:var(--accent2)">TON</strong> — TONCOIN, USDT, NOT, DOGS e mais.
    </p>
    <div style="display:flex;gap:12px;justify-content:center">
      <button class="btn btn-p" style="padding:12px 28px;font-size:15px" onclick="goTo('plans')">Começar Agora</button>
      <button class="btn btn-g" style="padding:12px 28px;font-size:15px" onclick="goTo('store')">Ver Demo</button>
    </div>
  </div>
  <div class="g3" style="margin-bottom:24px">
    ${[['⚡','Activação Imediata','Paga em qualquer token TON e a loja activa automaticamente.'],
       ['🪙','Multi-Moeda TON','Paga em TONCOIN, USDT, NOT, DOGS, BOLT e muito mais.'],
       ['🌐','Sub-loja Única','URL própria: digimarket.com/s/nome-da-loja']
      ].map(([i,t,d])=>`
    <div class="card"><div style="font-size:28px;margin-bottom:10px">${i}</div>
      <div style="font-family:'Syne',sans-serif;font-weight:600;font-size:14px;margin-bottom:6px">${t}</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.6">${d}</div>
    </div>`).join('')}
  </div>
  <div class="alert ai">
    <span>ℹ</span>
    <span>Pagamentos via <strong>xRocket Pay API</strong> · Token: 2b95ea...05d4 · Confirmação automática na blockchain TON.</span>
  </div>
  </div>`;
}

// ── PLANOS ────────────────────────────────────────────────────────────
function rPlans() {
  return `<div class="page">
  <h1>Escolhe o teu Plano</h1>
  <div class="sub">Paga com qualquer criptomoeda da rede TON. Activação automática após confirmação.</div>
  <div class="g4p" style="margin-bottom:24px">
    ${PLANS.map(p=>`
    <div class="plan-card pc-${p.id}">
      ${p.pop?'<div class="pop">MAIS POPULAR</div>':''}
      <div class="pn" style="color:${p.c}">${p.name}</div>
      <div class="pp" style="color:${p.c}">${p.price===0?'Grátis':'$'+p.price}<span style="font-size:14px;font-weight:400;color:var(--muted)">${p.price>0?'/mês':''}</span></div>
      <div class="pt">${p.price>0?'Valor calculado em tempo real':'Sem custo'}</div>
      <div class="div"></div>
      ${p.feat.map(f=>`<div class="pf">${f}</div>`).join('')}
      ${p.lock.map(f=>`<div class="pf lk">${f}</div>`).join('')}
      <button class="btn btn-p" style="width:100%;margin-top:14px;background:${p.price>0?p.c:'var(--border)'};color:${p.price>0?'#000':'var(--muted)'}"
        onclick="${p.price>0?`startCheckout('${p.id}')`:`goTo('login')`}">
        ${p.price>0?'Subscrever':'Começar Grátis'}
      </button>
    </div>`).join('')}
  </div>
  </div>`;
}

function startCheckout(planId) {
  if (!user) { goTo('login'); return; }
  selPlan = planId; selCurrency = null; invoiceData = null; currencies = [];
  goTo('checkout');
}

// ── CHECKOUT MULTI-MOEDA ──────────────────────────────────────────────
async function loadCurrencies() {
  try {
    const r = await api('GET', '/api/currencies');
    if (r.success) {
      currencies = r.currencies;
      render();
    }
  } catch(e) {
    currencies = [
      {currency:'TONCOIN',name:'Toncoin',emoji:'💎'},
      {currency:'USDT',name:'Tether USD',emoji:'💵'},
      {currency:'NOT',name:'Notcoin',emoji:'🪙'},
      {currency:'DOGS',name:'DOGS',emoji:'🐶'},
      {currency:'BOLT',name:'Bolt',emoji:'⚡'},
      {currency:'SCALE',name:'Scaleton',emoji:'⚖️'},
    ];
    render();
  }
}

async function selectCurrencyAndGetRate(currency) {
  selCurrency = currency;
  const plan = PLANS.find(p => p.id === selPlan);
  // Actualizar amount no card seleccionado
  try {
    const r = await api('GET', `/api/rate/${currency}`);
    const rate = r.usd_per_unit || 1;
    const amount = (plan.price / rate).toFixed(4);
    document.getElementById('sel-amount')?.innerHTML &&
      (document.getElementById('sel-amount').textContent = `${amount} ${currency}`);
    document.getElementById('pay-btn').disabled = false;
    document.getElementById('pay-btn').textContent = `Pagar ${amount} ${currency}`;
    document.getElementById('pay-btn').dataset.amount = amount;
  } catch(e) {}
  render();
}

async function createInvoice() {
  if (!selCurrency) return;
  const btn = document.getElementById('pay-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> A criar invoice...'; }

  try {
    const r = await api('POST', '/api/invoice/create', { plano: selPlan, currency: selCurrency });
    if (!r.success) throw new Error(r.error);
    invoiceData = r;

    // Abrir link de pagamento xRocket
    window.open(r.invoice_link, '_blank');

    // Começar polling de verificação
    startPolling(r.invoice_id);
    render();
  } catch(e) {
    alert('Erro ao criar invoice: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = 'Tentar novamente'; }
  }
}

function startPolling(invoiceId) {
  if (pollInterval) clearInterval(pollInterval);
  let attempts = 0;
  pollInterval = setInterval(async () => {
    attempts++;
    if (attempts > 60) { clearInterval(pollInterval); return; } // timeout 5 min
    try {
      const r = await api('GET', `/api/invoice/${invoiceId}/status`);
      if (r.paid) {
        clearInterval(pollInterval);
        await loadLojista();
        render();
      }
    } catch(e) {}
  }, 5000);
}

  const qs = plano ? `?plano=${plano}` : '';
  const r = await api('GET', `/api/admin/lojistas${qs}`);
  if (!r.success) { el.innerHTML = '<div class="alert ae">Erro ao carregar</div>'; return; }
  const lojistas = r.lojistas || [];
  el.innerHTML = `<div class="card" style="padding:0"><div class="tw"><table>
    <thead><tr><th>E-mail</th><th>Plano</th><th>Estado</th><th>Criado</th><th>Acções</th></tr></thead>
    <tbody>${lojistas.map(l=>`<tr>
      <td style="font-size:13px">${l.email}</td>
      <td><span class="badge bp" style="font-size:10px">${l.plano||'free'}</span></td>
      <td><span class="badge ${l.status==='active'?'ba':'bi'}">${l.status==='active'?'Activo':'Inactivo'}</span></td>
      <td style="font-size:11px;color:var(--muted)">${new Date(l.criado_em).toLocaleDateString('pt')}</td>
      <td><div style="display:flex;gap:4px">
        <button class="btn btn-g btn-s" style="font-size:11px" onclick="toggleUser('${l.id}','${l.status==='active'?'inactive':'active'}')">${l.status==='active'?'Desact.':'Activar'}</button>
        <button class="btn btn-d btn-s" style="font-size:11px" onclick="deleteUser('${l.id}')">✕</button>
      </div></td>
    </tr>`).join('')}</tbody>
  </table></div></div>`;
}

async function toggleUser(id, status) {
  await api('PUT', `/api/admin/lojistas/${id}`, { status });
  loadUsers();
}
async function deleteUser(id) {
  if (!confirm('Eliminar esta conta permanentemente?')) return;
  await api('DELETE', `/api/admin/lojistas/${id}`);
  loadUsers();
}
function filterUsers(plano) { loadUsers(plano); }

function rAdmConf() {
  return `<div class="g2">
  <div class="card">
    <div class="st2" style="margin-bottom:14px">Configurações TON / xRocket</div>
    <div class="fr"><div class="lbl">xRocket API Token</div><input id="c-apikey" placeholder="A carregar..."></div>
    <div class="fr"><div class="lbl">Taxa de câmbio TON/USD</div><input id="c-rate" type="number" step="0.01" placeholder="5.00"></div>
    <div class="fr"><div class="lbl">Taxa de transacção (%)</div><input id="c-taxa" type="number" step="0.1" placeholder="2.5"></div>
    <button class="btn btn-p btn-s" onclick="saveConfig()">Guardar</button>
    <div id="cfg-msg" style="font-size:12px;margin-top:8px"></div>
  </div>
  <div class="card">
    <div class="st2" style="margin-bottom:14px">Preços dos Planos (TON)</div>
    <div class="fr"><div class="lbl">Standard (TON/mês)</div><input id="c-std" type="number" step="0.1" placeholder="2.5"></div>
    <div class="fr"><div class="lbl">Pro (TON/mês)</div><input id="c-pro" type="number" step="0.1" placeholder="7.0"></div>
    <div class="fr"><div class="lbl">Business (TON/mês)</div><input id="c-biz" type="number" step="0.1" placeholder="16.5"></div>
    <div class="fr"><div class="lbl">Domínio da plataforma</div><input id="c-dom" placeholder="digimarket.com"></div>
    <button class="btn btn-p btn-s" onclick="saveConfig()">Guardar</button>
  </div>
  </div>`;
}

async function loadConfig() {
  const r = await api('GET', '/api/admin/config');
  if (!r.success) return;
  const c = r.config;
  const set = (id, val) => { const el = document.getElementById(id); if(el && val) el.value = val; };
  set('c-apikey', c.ton_api_key);
  set('c-rate', c.ton_usd_rate);
  set('c-taxa', c.taxa_transacao);
  set('c-std', c.preco_standard_ton);
  set('c-pro', c.preco_pro_ton);
  set('c-biz', c.preco_business_ton);
  set('c-dom', c.dominio_plataforma);
}

async function saveConfig() {
  const get = id => document.getElementById(id)?.value;
  const r = await api('PUT', '/api/admin/config', {
    ton_api_key: get('c-apikey'),
    ton_usd_rate: parseFloat(get('c-rate')),
    taxa_transacao: parseFloat(get('c-taxa')),
    preco_standard_ton: parseFloat(get('c-std')),
    preco_pro_ton: parseFloat(get('c-pro')),
    preco_business_ton: parseFloat(get('c-biz')),
    dominio_plataforma: get('c-dom'),
  });
  const msg = document.getElementById('cfg-msg');
  if (msg) msg.innerHTML = r.success ? '<span style="color:var(--success)">✓ Guardado</span>' : `<span style="color:var(--danger)">${r.error}</span>`;
}

function rAdmStats() {
  return `<div id="stats-ct"><div style="text-align:center;padding:20px"><div class="spinner" style="margin:0 auto"></div></div></div>`;
}

async function loadStats() {
  const el = document.getElementById('stats-ct');
  if (!el) return;
  const r = await api('GET', '/api/admin/stats');
  if (!r.success) { el.innerHTML = '<div class="alert ae">Erro ao carregar estatísticas</div>'; return; }
  const { total, ativos, receitaUSD, distribuicao } = r;
  el.innerHTML = `
  <div class="g4" style="margin-bottom:20px">
    <div class="stat"><div class="sl">Lojistas Totais</div><div class="sv">${total||0}</div></div>
    <div class="stat"><div class="sl">Lojistas Activos</div><div class="sv">${ativos||0}</div></div>
    <div class="stat"><div class="sl">Receita Total</div><div class="sv" style="font-size:18px">$${(receitaUSD||0).toFixed(2)}</div></div>
    <div class="stat"><div class="sl">Taxa Activação</div><div class="sv">${total?Math.round((ativos/total)*100):0}%</div></div>
  </div>
  <div class="card">
    <div class="st2" style="margin-bottom:14px">Distribuição por Plano</div>
    <div class="ab">
      ${PLANS.map(p=>{
        const n = distribuicao?.[p.id] || 0;
        const pct = total ? Math.round(n/total*100) : 0;
        return `<div class="ar"><div class="al" style="color:${p.c}">${p.name}</div>
          <div class="at"><div class="af" style="width:${pct}%;background:${p.c}"></div></div>
          <div class="av">${n} (${pct}%)</div></div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── Render pós-carregamento ────────────────────────────────────────────
const origRender = render;
async function renderAsync() {
  origRender();
  // Carregar dados após render
  if (page === 'dashboard') {
    if (dtab === 'products') setTimeout(loadProducts, 100);
  }
  if (page === 'store') setTimeout(loadStore, 100);
  if (page === 'admin') {
    if (atab === 'users') setTimeout(loadUsers, 100);
    if (atab === 'config') setTimeout(loadConfig, 100);
    if (atab === 'stats') setTimeout(loadStats, 100);
  }
}
window.render = renderAsync;

// ── Init ──────────────────────────────────────────────────────────────
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    user = session.user;
    updateNav();
    await loadLojista();
  }
  render();
})();
</script>
</body>
</html>
